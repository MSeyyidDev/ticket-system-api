services:
  - type: web
    name: ticket-system-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: demo
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///./tickets.db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: admin123
